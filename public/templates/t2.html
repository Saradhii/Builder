<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Airlines — Travel the World Without Any Stress</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --white: #ffffff;
    --black: #000000;
    --overlay-top: rgba(0, 0, 0, 0.10);
    --overlay-bottom: rgba(0, 0, 0, 0.40);
    --nav-pad: clamp(20px, 5vw, 56px);
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  html::-webkit-scrollbar { display: none; width: 0; height: 0; }

  body {
    font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: #000;
    color: #fff;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ============ HERO ============ */
  .hero {
    position: relative;
    height: 100vh;
    min-height: 620px;
    width: 100%;
    overflow: hidden;
  }

  .bg-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, var(--overlay-top) 0%, var(--overlay-bottom) 100%);
    z-index: 1;
  }

  /* ============ NAVIGATION ============ */
  .nav {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px var(--nav-pad);
    opacity: 0;
    transform: translateY(-16px);
    animation: fadeInUp 0.9s var(--ease) forwards;
  }

  .logo {
    color: #fff;
    font-weight: 600;
    font-size: 20px;
    letter-spacing: -0.02em;
  }

  .menu {
    display: flex;
    align-items: center;
    gap: 36px;
    list-style: none;
  }

  .menu a {
    color: rgba(255, 255, 255, 0.9);
    font-size: 14px;
    font-weight: 400;
    text-decoration: none;
    transition: color 0.25s ease;
    position: relative;
    display: inline-block;
  }

  .menu a::after {
    content: '';
    position: absolute;
    left: 0;
    bottom: -5px;
    height: 1px;
    width: 0;
    background: rgba(255, 255, 255, 0.85);
    transition: width 0.3s var(--ease);
  }

  .menu a:hover { color: #fff; }
  .menu a:hover::after { width: 100%; }

  .nav-actions {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .nav-cta {
    background: transparent;
    border: 1px solid #ffffff;
    color: #ffffff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 400;
    padding: 10px 20px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.25s ease, color 0.25s ease;
  }

  .nav-cta:hover {
    background: #ffffff;
    color: #000000;
  }

  .hamburger {
    display: none;
    width: 32px;
    height: 32px;
    background: transparent;
    border: none;
    cursor: pointer;
    color: #fff;
    align-items: center;
    justify-content: center;
  }
  .hamburger svg { width: 24px; height: 24px; }

  /* ============ HERO CONTENT ============ */
  .hero-content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 24px;
    max-width: 920px;
    margin: 0 auto;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    border: 1px solid rgba(255, 255, 255, 0.22);
    background: rgba(255, 255, 255, 0.07);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.92);
    margin-bottom: 26px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.9s var(--ease) forwards;
    animation-delay: 0.25s;
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 0 4px rgba(74, 222, 128, 0.20);
  }

  .hero h1 {
    font-size: 38px;
    font-weight: 500;
    line-height: 1.1;
    color: #ffffff;
    letter-spacing: -0.02em;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.9s var(--ease) forwards;
    animation-delay: 0.4s;
  }

  .hero-sub {
    font-size: 15px;
    color: rgba(255, 255, 255, 0.80);
    max-width: 560px;
    line-height: 1.65;
    margin-top: 22px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.9s var(--ease) forwards;
    animation-delay: 0.55s;
  }

  .cta {
    background: #ffffff;
    color: #000000;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    padding: 12px 26px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 36px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease);
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.9s var(--ease) forwards;
    animation-delay: 0.7s;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }

  .cta:hover {
    transform: scale(1.05);
    box-shadow: 0 18px 48px rgba(0, 0, 0, 0.30);
  }

  .cta .arrow { transition: transform 0.3s var(--ease); }
  .cta:hover .arrow { transform: translateX(3px); }

  /* ============ SCROLL HINT ============ */
  .scroll-hint {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    color: rgba(255, 255, 255, 0.72);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 1s ease forwards;
    animation-delay: 1s;
  }

  .mouse {
    width: 22px;
    height: 36px;
    border: 1.5px solid rgba(255, 255, 255, 0.55);
    border-radius: 14px;
    position: relative;
  }
  .mouse::before {
    content: '';
    position: absolute;
    top: 7px;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    height: 7px;
    background: rgba(255, 255, 255, 0.85);
    border-radius: 3px;
    animation: scrollDot 1.7s ease-in-out infinite;
  }

  /* ============ MOBILE MENU ============ */
  .mobile-menu {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.94);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 26px;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.35s ease, visibility 0.35s ease;
  }
  .mobile-menu.open { opacity: 1; visibility: visible; }

  .mobile-menu a {
    color: #ffffff;
    text-decoration: none;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .m-cta {
    margin-top: 14px;
    background: #fff;
    color: #000;
    border: none;
    padding: 12px 26px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
  }

  .mobile-close {
    position: absolute;
    top: 22px;
    right: 22px;
    width: 38px;
    height: 38px;
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ============ KEYFRAMES ============ */
  @keyframes fadeInUp {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  @keyframes scrollDot {
    0%   { opacity: 0; transform: translate(-50%, -4px); }
    40%  { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, 10px); }
  }

  /* ============ RESPONSIVE ============ */
  @media (min-width: 768px) {
    .hero h1 { font-size: 56px; }
    .hero-sub { font-size: 18px; }
  }

  @media (max-width: 767px) {
    .menu,
    .nav-cta { display: none; }
    .hamburger { display: flex; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<header class="hero">
  <video class="bg-video" autoplay muted loop playsinline preload="auto"
    poster="https://picsum.photos/seed/airlineshero/1920/1080">
    <source src="https://cdn.sceneai.art/Hero%20Section%20Video/01d1f8de-fec0-4bf5-8b48-9fc2dbc8c6b0.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>

  <nav class="nav">
    <div class="logo">Airlines</div>
    <ul class="menu">
      <li><a href="#about">About</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="#locations">Locations</a></li>
      <li><a href="#places">Places</a></li>
      <li><a href="#support">Support</a></li>
    </ul>
    <div class="nav-actions">
      <button class="nav-cta">Start Travel</button>
      <button class="hamburger" id="hamburger" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="7" x2="21" y2="7"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="17" x2="21" y2="17"/>
        </svg>
      </button>
    </div>
  </nav>

  <main class="hero-content">
    <span class="badge">
      <span class="badge-dot"></span>
      Now boarding — 200+ destinations
    </span>
    <h1>Travel the World<br>Without Any Stress</h1>
    <p class="hero-sub">Let us take care of the planning while you enjoy meaningful travel experiences crafted just for you.</p>
    <button class="cta">
      Start Exploring
      <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </button>
  </main>

  <div class="scroll-hint">
    <span>Scroll</span>
    <span class="mouse" aria-hidden="true"></span>
  </div>
</header>

<div class="mobile-menu" id="mobileMenu" role="dialog" aria-modal="true" aria-label="Mobile menu">
  <button class="mobile-close" id="mobileClose" aria-label="Close menu">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="6" y1="6" x2="18" y2="18"/>
      <line x1="18" y1="6" x2="6" y2="18"/>
    </svg>
  </button>
  <a href="#about">About</a>
  <a href="#services">Services</a>
  <a href="#locations">Locations</a>
  <a href="#places">Places</a>
  <a href="#support">Support</a>
  <button class="m-cta">Start Travel</button>
</div>

<script>
  const hamburger   = document.getElementById('hamburger');
  const mobileMenu  = document.getElementById('mobileMenu');
  const mobileClose = document.getElementById('mobileClose');

  const openMenu  = () => mobileMenu.classList.add('open');
  const closeMenu = () => mobileMenu.classList.remove('open');

  hamburger.addEventListener('click', openMenu);
  mobileClose.addEventListener('click', closeMenu);
  mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', closeMenu));
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeMenu(); });
</script>

</body>
</html>
